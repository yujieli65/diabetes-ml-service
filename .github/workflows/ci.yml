name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1️⃣ 拉代码
    - name: Checkout code
      uses: actions/checkout@v4

    # 2️⃣ 设置 Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    # 3️⃣ 安装依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install flake8 pytest

    # 4️⃣ 代码检查（lint）
    - name: Lint code
      run: |
        flake8 app training

    # 5️⃣ 跑测试
    - name: Run tests
      run: |
        pytest

    # 6️⃣ 训练模型（smoke test）
    - name: Train model
      run: |
        python training/train.py

    # 7️⃣ 上传 artifacts（评分点！）
    - name: Upload model artifacts
      uses: actions/upload-artifact@v4
      with:
        name: model-artifacts
        path: model/