name: Release

on:
  push:
    tags:
      - 'v*'  # 只在 push v 开头的 tag 时触发

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout 代码
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ 设置 Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      # 3️⃣ 安装依赖
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install joblib uvicorn fastapi

      # 4️⃣ 训练模型
      - name: Train model
        run: python training/train.py

      # 5️⃣ GHCR 登录
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 6️⃣ 构建 Docker 镜像
      - name: Build Docker image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/diabetes-api:${{ github.ref_name }}
          docker build -t $IMAGE_NAME .

      # 7️⃣ 容器 smoke test
      - name: Test Docker container
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/diabetes-api:${{ github.ref_name }}
          docker run -d -p 8000:8000 --name test_container $IMAGE_NAME
          for i in {1..10}; do
            sleep 2
            if curl -f http://localhost:8000/health; then
              echo "Service is up!"
              break
            fi
          done
          docker logs test_container
          docker stop test_container
          docker rm test_container

      # 8️⃣ 推送 Docker 镜像到 GHCR
      - name: Push Docker image
        run: |
          IMAGE_NAME=ghcr.io/yujieli65/diabetes-api:${{ github.ref_name }}
          docker push $IMAGE_NAME
      # 9️⃣ 创建 GitHub Release
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}